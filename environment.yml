# Document Intelligence Pipeline — reproducible environment.
#
# Single source of truth for runtime dependencies. Pinned to the exact
# versions used to produce the experimental results in the thesis.
#
# Usage:
#   conda env create -f environment.yml
#   conda activate silo
#   python scripts/bootstrap.py
#
# Hardware requirements: NVIDIA GPU, CUDA 12.4 driver
#                        (CUDA toolkit is shipped via the torch wheel).
# Tested on: RTX 3090 (compute capability 8.6), Ubuntu 22.04.

name: silo

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12.12
  - pip=25.3
  - pip:
      # PyTorch stack — pinned to CUDA 12.4 wheels.
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.5.1
      - torchvision==0.20.1
      - xformers==0.0.28.post3

      # HuggingFace stack.
      - transformers==4.57.6
      - tokenizers==0.22.2
      - huggingface-hub==0.36.0
      - safetensors==0.7.0
      - accelerate==1.12.0
      - peft==0.18.1
      - trl==0.24.0
      - datasets==4.3.0
      - sentencepiece==0.2.1
      - bitsandbytes==0.49.2

      # Unsloth fine-tune runtime (Llama VLM + Qwen extractor).
      - unsloth==2026.3.4
      - unsloth-zoo==2026.3.2

      # Layout / document analysis stack.
      # paddleocr bumped 2.9.1 -> 2.10.0: 2.9.1 pins albumentations==1.4.10,
      # which conflicts with doclayout-yolo 0.0.4's albumentations>=1.4.11.
      # 2.10.0 drops the strict pin while keeping the same public PaddleOCR API.
      - paddleocr==2.10.0
      - paddlepaddle==2.6.2
      - doclayout-yolo==0.0.4
      - ultralytics==8.4.5

      # Grounding / span extraction.
      - langextract==1.1.1

      # PDF + image I/O.
      - PyMuPDF==1.26.7
      - pdfplumber>=0.11
      - pypdfium2==4.30.0
      - opencv-python==4.11.0.86
      - Pillow==10.4.0

      # Data + science.
      - numpy==1.26.4
      - pandas==2.3.3
      - matplotlib==3.10.8
      - networkx>=3.0

      # Schema, config, runtime.
      - pydantic==2.12.5
      - pydantic-settings==2.12.0
      - python-dotenv==1.2.1
      - tqdm==4.67.1
      - requests==2.32.5
      - PyYAML>=6.0

      # API clients (optional teacher/oracle calls).
      - anthropic==0.86.0
      - openai>=1.0
